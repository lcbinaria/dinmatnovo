    <div id="root"></div>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        // Trava de Exit-Intent (Evita saltos surpresas na movimentação de foco de mobile/mouse)
        document.addEventListener('mouseleave', e => e.stopPropagation(), true); 
        
        const observer = new MutationObserver(() => {
          // Busca o H2 com o título dos bônus
          const h2s = Array.from(document.querySelectorAll('h2'));
          const targetH2 = h2s.find(h2 => h2.textContent.match(/bônus exclusivos/i));
          
          if (targetH2) {
            const container = targetH2.nextElementSibling;
            // Se encontrou o container e ele ainda não tem a classe do carrossel
            if (container && container.children.length > 0 && !container.classList.contains('bonus-marquee-wrapper')) {
              const cardsArray = Array.from(container.children);
              
              if (cardsArray.length > 0) {
                  container.classList.add('bonus-marquee-wrapper');
                  container.innerHTML = ''; // Limpa o conteudo injetado pelo React pra reconstruir o carrossel
                  
                  const track = document.createElement('div');
                  track.className = 'bonus-marquee-track';
                  
                  // Injeta as 2 cópias para a animação do carrossel não ter interrupções (loop perfeito)
                  cardsArray.forEach(card => track.appendChild(card.cloneNode(true)));
                  cardsArray.forEach(card => track.appendChild(card.cloneNode(true)));
                  
                  container.appendChild(track);
              }
            }
          }
          


          // Otimização CRO: Hierarquia Visual de Ofertas (Modelo Clean)
          const allButtons = document.querySelectorAll('button, a');
          allButtons.forEach(btn => {
              const text = btn.textContent.toUpperCase();
              if (text.includes('PLANO PREMIUM') || text.includes('PLANO BÁSICO') || text.includes('PLANO BASICO')) {
                  // Usa regras multi-classes para achar o Card ou sobre árvore do Documento garantindo sua localização.
                  let card = btn.closest('.rounded-3xl, .rounded-2xl, .rounded-xl, .shadow-lg, .shadow-xl, .shadow-md');
                  if (!card) {
                      let parent = btn;
                      for(let i=0; i<4; i++) {
                         if(parent.parentElement && parent.parentElement.id !== 'root') {
                             parent = parent.parentElement;
                         }
                      }
                      card = parent;
                  }
                  
                  // Trava de bug: Garante que os estilos interativos de Card nunca sejam aplicados no Pop-up de fundo estático!
                  if (card && !card.closest('[role="dialog"]')) {
                      if (text.includes('PREMIUM')) {
                          card.classList.add('cro-super-premium');
                          
                          // 1. Troca a Imagem Principal do Card
                          const premiumImg = card.querySelector('img');
                          if (premiumImg && !premiumImg.src.includes('ZzS7qVbX/din.png')) {
                              premiumImg.src = 'https://i.ibb.co/ZzS7qVbX/din.png';
                              premiumImg.style.objectFit = 'contain';
                          }
                          
                          // Overlay de Presente Ouro no topo-direito
                          if (!card.querySelector('.cro-gift-badge')) {
                              const giftBadge = `<div class="cro-gift-badge" style="position:absolute; top:-15px; right:-15px; background-color:#eab308; color:#1e293b; width:48px; height:48px; border-radius:50%; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 10px rgba(234,179,8,0.4); z-index:20;">
                                  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 12 20 22 4 22 4 12"></polyline><rect x="2" y="7" width="20" height="5"></rect><line x1="12" y1="22" x2="12" y2="7"></line><path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"></path><path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"></path></svg>
                              </div>`;
                              card.insertAdjacentHTML('beforeend', giftBadge);
                          }
                          
                          // Tag "-62% OFF" na frente do preco e garantir preco velho em cinza
                          const priceText = card.querySelector('.text-price-new');
                          if (priceText && !priceText.querySelector('.cro-off-badge')) {
                              priceText.insertAdjacentHTML('beforeend', `<span class="cro-off-badge">-62% OFF</span>`);
                          }
                          
                          // Microcopy abaixo do botao
                          if (!btn.parentElement.querySelector('.cro-trust-copy')) {
                              const trustCopy = `<div class="cro-trust-copy" style="text-align:center; font-size:0.75rem; margin-top:12px; line-height:1.4;">
                                  <div style="color:#16a34a; font-weight:700; margin-bottom:4px;">⭐ Mais de 80% dos professores escolhem esta opção</div>
                                  <div style="color:#64748b; font-weight:500;">🔒 Pagamento 100% seguro • Acesso imediato</div>
                              </div>`;
                              btn.parentElement.insertAdjacentHTML('beforeend', trustCopy);
                          }
                          
                          // Reordenação de Bônus (Joga os bônus para o final usando CSS Flexbox)
                          const listContainer = card.querySelector('ul');
                          if (listContainer) {
                              // CSS Flex garante a reordenação visual perfeita sem quebrar o HTML do React
                              listContainer.style.display = 'flex';
                              listContainer.style.flexDirection = 'column';
                              
                              const items = Array.from(listContainer.querySelectorAll('li'));
                              items.forEach(li => {
                                  if (li.textContent.includes('BÔNUS:')) {
                                      li.style.order = "999"; // Empurra os bônus pro final da lista
                                      
                                      // Aplicar estilo de destaque rápido
                                      if (!li.dataset.croStyled) {
                                          li.style.background = "#f0fdf4";
                                          li.style.padding = "4px 8px";
                                          li.style.borderRadius = "8px";
                                          li.style.marginTop = "8px";
                                          li.style.color = "#16a34a";
                                          li.style.fontWeight = "700";
                                          li.dataset.croStyled = "true";
                                      }
                                  } else {
                                      li.style.order = "1"; // Mantém itens comuns em cima
                                  }
                              });
                          }
                          
                      } else {
                          // Plano base
                          card.classList.add('cro-basic-fade');
                      }
                  }
              }
          });

          // Otimização CRO: Textos (Limpeza e Substituição global)
          const allElementsWithText = document.querySelectorAll('body *:not(script):not(style)');
          allElementsWithText.forEach(el => {
              el.childNodes.forEach(child => {
                  if (child.nodeType === 3) { // Apenas os Nós de Texto puro
                      const text = child.nodeValue.toLowerCase();
                      
                      // 1. Limpar "Você economiza"
                      if (text.includes('economiza r$') || text.includes('economiza')) {
                          if (el.childNodes.length === 1) {
                              el.style.display = 'none';
                          } else {
                              child.nodeValue = '';
                          }
                      }
                      
                      // 2. Substituir "Suporte prioritário" para WhatsApp
                      if (text.includes('suporte prioritário') || text.includes('suporte prioritario')) {
                          child.nodeValue = child.nodeValue.replace(/suporte priorit[áa]rio/i, 'Suporte no WhatsApp');
                      }
                      
                      // 3. Garantias para 30 dias nas listas (Checkmarks)
                      if (text.includes('garantia')) {
                          child.nodeValue = child.nodeValue.replace(/\d+\s*dias/gi, '30 dias');
                      }
                      
                      // 4. Remover " PDF" globalmente
                      if (text.includes('+400 dinâmicas') || text.includes('+400 dinamicas')) {
                          child.nodeValue = child.nodeValue.replace(/\s*PDF/gi, '');
                      }
                      // 5. Corrigir Subheadline principal textualmente exata ao pedido
                      if (text.includes('400+ atividades prontas')) {
                          child.nodeValue = child.nodeValue.replace(/400\+\s*/gi, '');
                      }
                      if (text.includes('professores aplicarem em sala de aula')) {
                          child.nodeValue = child.nodeValue.replace(/para professores aplicarem em sala de aula, sem planejamento\.?/gi, 'para aplicar. Rapido e fácil!');
                      }
                      
                      // 6. Atualizar botões de CTA principais (Quero as Dinâmicas)
                      if (text.includes('quero acesso imediato')) {
                          child.nodeValue = child.nodeValue.replace(/quero acesso imediato!?/gi, 'QUERO AS DINÂMICAS AGORA!');
                      }
                      
                      // 7. Atualizar subtítulo de apresentação das Dinâmicas
                      if (text.includes('transformam conteúdos de matemática') || text.includes('leves e fáceis de aplicar')) {
                          child.nodeValue = 'Material Completo, Pronto para Impressão';
                      }
                  }
              });
          });

          // Otimização CRO: Redução da Ancoragem
          const oldPricesElements = document.querySelectorAll('.line-through, .text-price-old, s, strike, del');
          oldPricesElements.forEach(el => {
              if (!el.dataset.croPriceToggled) {
                  el.childNodes.forEach(child => {
                      if (child.nodeType === 3) { // Apenas os Nós de Texto
                          if (child.nodeValue.includes('297')) {
                              child.nodeValue = child.nodeValue.replace(/297/g, '97');
                              el.dataset.croPriceToggled = 'true';
                          } else if (child.nodeValue.includes('97')) {
                              child.nodeValue = child.nodeValue.replace(/97/g, '67');
                              el.dataset.croPriceToggled = 'true';
                          }
                      }
                  });
              }
          });
          // Otimização CRO: Fix na Seção Principal de Garantias e Imagem (À prova de re-render do React)
          const searchHeaders = document.querySelectorAll('h1, h2, h3, h4, p, span, div');
          searchHeaders.forEach(el => {
              if (el.textContent === 'Garantia Incondicional' || (el.tagName.match(/^H[1-6]/) && el.textContent.includes('Garantia Incondicional'))) {
                  let container = el.parentElement;
                  while(container && container.tagName !== 'SECTION' && container.id !== 'root') {
                      container = container.parentElement;
                  }
                  
                  if (container && container.id !== 'root') {
                      // 1. Troca a imagem toda vez que o React reverter (não atrela verificação a dataset no pai)
                      const img = container.querySelector('img');
                      if (img && !img.src.includes('garantia30dias.png')) {
                          img.src = 'https://i.ibb.co/Kjz6zq9N/garantia30dias.png';
                          img.style.objectFit = 'contain';
                      }
                      
                      // 2. Arruma o parágrafo se o React também tiver revertido pros 7 dias originais
                      const params = container.querySelectorAll('p');
                      params.forEach(p => {
                          if (p.textContent.includes('7 dias') || p.textContent.includes('satisfeita,.')) {
                              p.innerHTML = `Você tem <span class="font-bold text-gray-900">30 dias</span> para testar as +400 Dinâmicas. Se por qualquer motivo você não ficar satisfeita, devolvemos <span class="font-bold text-gray-900">100% do seu investimento</span>, sem perguntas.`;
                          }
                      });
                  }
              }
          });

          // Otimização CRO: Tracking Forçado de InitiateCheckout (Garantia de Pixel)
          const allCheckoutBtns = document.querySelectorAll('button, a');
          allCheckoutBtns.forEach(btn => {
              const bText = btn.textContent.toUpperCase();
              if (bText.includes('DINÂMICAS AGORA') || bText.includes('PREMIUM') || bText.includes('BÁSICO') || bText.includes('BASICO')) {
                  if (!btn.dataset.croPixelTracked) {
                      btn.addEventListener('click', () => {
                          console.log("[CRO] Botão de Oferta Clicado: disparando regras de IC (InitiateCheckout)");
                          // Dispara o Checkout diretamente no motor nativo que a UTMify instala
                          if (typeof fbq === 'function') {
                              fbq('track', 'InitiateCheckout', { content_name: bText.trim() });
                          }
                          if (typeof ttq !== 'undefined' && typeof ttq.track === 'function') {
                              ttq.track('InitiateCheckout', { content_name: bText.trim() });
                          }
                      });
                      btn.dataset.croPixelTracked = 'true';
                  }
              }
          });

          // Otimização CRO: Injetar Vídeo VSL Wistia DIRETAMENTE abaixo da Subheadline
          const allPElements = document.querySelectorAll('p');
          allPElements.forEach(p => {
              if (p.textContent.includes('planejando') && p.textContent.includes('aplicar')) {
                  if (!p.parentElement.querySelector('.wistia-cro-injected')) {
                      // 1. Ocultar qualquer imagem nesta seção de banner (Excluindo como pedido na task)
                      let heroBlock = p.closest('section') || p.parentElement.parentElement;
                      if (heroBlock) {
                          heroBlock.querySelectorAll('img').forEach(img => {
                              img.style.display = 'none';
                              // Oculta também a caixa / mascara em volta da foto real pra não sozinhar sobras brancas de layout
                              if(img.parentElement) {
                                  img.parentElement.style.display = 'none';
                                  if(img.parentElement.parentElement && img.parentElement.parentElement.className.includes('relative')) {
                                      img.parentElement.parentElement.style.display = 'none';
                                  }
                              }
                          });
                      }
                      
                      // 2. Injeta o Player HTML bruto como elo irmão subsequente
                      const videoContainer = document.createElement('div');
                      videoContainer.className = 'wistia-cro-injected';
                      videoContainer.style.width = '100%';
                      videoContainer.style.maxWidth = '360px'; // Adequar a visão de celular/vertical do player wistia aspect 0.5625
                      videoContainer.style.margin = '2rem auto';
                      videoContainer.style.borderRadius = '16px';
                      videoContainer.style.overflow = 'hidden';
                      videoContainer.style.boxShadow = '0 25px 50px -12px rgba(0, 0, 0, 0.25)';
                      videoContainer.style.position = 'relative';
                      videoContainer.style.zIndex = '50';
                      
                      videoContainer.innerHTML = `<style>wistia-player[media-id='enscm0nkzb']:not(:defined) { background: center / contain no-repeat url('https://fast.wistia.com/embed/medias/enscm0nkzb/swatch'); display: block; filter: blur(5px); padding-top:177.78%; }</style> <wistia-player media-id="enscm0nkzb" aspect="0.5625"></wistia-player>`;
                      
                      p.insertAdjacentElement('afterend', videoContainer);
                  }
              }
          });
        });
        observer.observe(document.body, { childList: true, subtree: true });
      });
    </script>
